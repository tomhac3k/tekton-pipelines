apiVersion: template.openshift.io/v1
kind: Template
labels:
  app: ${NAME}
  template: secure-git-maven-build
metadata:
  name: secure-git-maven-build
  annotations:
    description: Build a Java/Maven application image from a private Git repository using username and token authentication
objects:
- apiVersion: v1
  kind: Secret
  metadata:
    name: ${NAME}-git-secret
    labels:
      app: ${NAME}
  type: kubernetes.io/basic-auth
  stringData:
    username: ${GIT_USERNAME}
    password: ${GIT_TOKEN}
- apiVersion: image.openshift.io/v1
  kind: ImageStream
  metadata:
    name: ${NAME}
    labels:
      app: ${NAME}
    annotations:
      description: Keeps track of changes in the Maven application image
- apiVersion: build.openshift.io/v1
  kind: BuildConfig
  metadata:
    name: ${NAME}
    labels:
      app: ${NAME}
    annotations:
      description: Builds the Maven application image from a private Git repository
      template.alpha.openshift.io/wait-for-ready: "true"
  spec:
    output:
      to:
        kind: ImageStreamTag
        name: ${NAME}:latest
    source:
      type: Git
      git:
        uri: ${SOURCE_REPOSITORY_URL}
        ref: ${SOURCE_REPOSITORY_REF}
      contextDir: ${CONTEXT_DIR}
      sourceSecret:
        name: ${NAME}-git-secret
    strategy:
      type: Source
      sourceStrategy:
        from:
          kind: ImageStreamTag
          name: java:${JAVA_VERSION}
          namespace: ${NAMESPACE}
        env:
        - name: MAVEN_ARGS
          value: ${MAVEN_ARGS}
    triggers:
    - type: ConfigChange
    - type: ImageChange
      imageChange: {}
    - type: Generic
      generic:
        secret: ${GENERIC_WEBHOOK_SECRET}
parameters:
- name: NAME
  displayName: Application Name
  description: Name used for all resources created by this template
  required: true
  value: myapp
- name: SOURCE_REPOSITORY_URL
  displayName: Git Repository URL
  description: HTTPS URL of the private Git repository (do not embed credentials in the URL)
  required: true
- name: SOURCE_REPOSITORY_REF
  displayName: Git Reference
  description: Branch, tag, or commit to build
  value: main
- name: GIT_USERNAME
  displayName: Git Username
  description: Username for Git authentication (GitLab/GitHub username, or oauth2 for some GitLab setups)
  required: true
- name: GIT_TOKEN
  displayName: Git Token
  description: Personal access token or password for Git authentication
  required: true
- name: CONTEXT_DIR
  displayName: Context Directory
  description: Relative path within the repository containing pom.xml (leave blank if at repo root)
- name: JAVA_VERSION
  displayName: Java Version
  description: Java S2I builder image tag from the openshift namespace
  required: true
  value: 17-ubi9
- name: NAMESPACE
  displayName: Builder Image Namespace
  description: Namespace where the Java builder ImageStreamTag resides
  required: true
  value: openshift
- name: MAVEN_ARGS
  displayName: Maven Arguments
  description: Arguments passed to Maven during the S2I assemble phase
  value: "-DskipTests package"
- name: GENERIC_WEBHOOK_SECRET
  displayName: Generic Webhook Secret
  description: Secret string for the Generic build webhook trigger
  generate: expression
  from: '[a-zA-Z0-9]{40}'
