apiVersion: template.openshift.io/v1
kind: Template
labels:
  app: ${NAME}
  template: npm-app-deploy
metadata:
  name: npm-app-deploy
  annotations:
    description: Deploy the npm application using the ImageStream built by the secure-git-npm-build template
objects:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: ${NAME}
    labels:
      app: ${NAME}
    annotations:
      description: Deploys the npm application from the ImageStream
      image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"${NAME}:${IMAGE_TAG}"},"fieldPath":"spec.template.spec.containers[0].image"}]'
      template.alpha.openshift.io/wait-for-ready: "true"
  spec:
    replicas: ${{REPLICAS}}
    selector:
      matchLabels:
        app: ${NAME}
    strategy:
      type: RollingUpdate
    template:
      metadata:
        labels:
          app: ${NAME}
      spec:
        containers:
        - name: ${NAME}
          image: ' '
          ports:
          - containerPort: ${{CONTAINER_PORT}}
            protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: ${{CONTAINER_PORT}}
            initialDelaySeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: ${{CONTAINER_PORT}}
            initialDelaySeconds: 5
            timeoutSeconds: 3
          resources:
            limits:
              memory: ${MEMORY_LIMIT}
            requests:
              memory: ${MEMORY_REQUEST}
- apiVersion: v1
  kind: Service
  metadata:
    name: ${NAME}
    labels:
      app: ${NAME}
    annotations:
      description: Exposes the npm application pods
  spec:
    ports:
    - name: http
      port: ${{CONTAINER_PORT}}
      targetPort: ${{CONTAINER_PORT}}
    selector:
      app: ${NAME}
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    name: ${NAME}
    labels:
      app: ${NAME}
    annotations:
      description: Exposes the npm application externally
      template.openshift.io/expose-uri: http://{.spec.host}{.spec.path}
  spec:
    host: ${APPLICATION_DOMAIN}
    to:
      kind: Service
      name: ${NAME}
    port:
      targetPort: http
parameters:
- name: NAME
  displayName: Application Name
  description: Must match the NAME used in the secure-git-npm-build template
  required: true
  value: myapp
- name: IMAGE_TAG
  displayName: Image Tag
  description: ImageStream tag to deploy (output from the build template)
  required: true
  value: latest
- name: REPLICAS
  displayName: Replicas
  description: Number of application pods to run
  value: "1"
- name: CONTAINER_PORT
  displayName: Container Port
  description: Port exposed by the npm application (8080 for Node.js S2I)
  value: "8080"
- name: MEMORY_LIMIT
  displayName: Memory Limit
  description: Maximum memory the container can use
  value: 512Mi
- name: MEMORY_REQUEST
  displayName: Memory Request
  description: Minimum memory requested for the container
  value: 256Mi
- name: APPLICATION_DOMAIN
  displayName: Application Hostname
  description: Custom hostname for the Route (leave blank for an auto-generated host)
