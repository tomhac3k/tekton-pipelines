apiVersion: template.openshift.io/v1
kind: Template
labels:
  app: ${NAME}
  template: secure-git-npm-build
metadata:
  name: secure-git-npm-build
  annotations:
    description: Build a Node.js/npm application image from a private Git repository using username and token authentication
objects:
- apiVersion: v1
  kind: Secret
  metadata:
    name: ${NAME}-git-secret
    labels:
      app: ${NAME}
  type: kubernetes.io/basic-auth
  stringData:
    username: ${GIT_USERNAME}
    password: ${GIT_TOKEN}
- apiVersion: image.openshift.io/v1
  kind: ImageStream
  metadata:
    name: ${NAME}
    labels:
      app: ${NAME}
    annotations:
      description: Keeps track of changes in the npm application image
- apiVersion: build.openshift.io/v1
  kind: BuildConfig
  metadata:
    name: ${NAME}
    labels:
      app: ${NAME}
    annotations:
      description: Builds the npm application image from a private Git repository
      template.alpha.openshift.io/wait-for-ready: "true"
  spec:
    output:
      to:
        kind: ImageStreamTag
        name: ${NAME}:latest
    source:
      type: Git
      git:
        uri: ${SOURCE_REPOSITORY_URL}
        ref: ${SOURCE_REPOSITORY_REF}
      contextDir: ${CONTEXT_DIR}
      sourceSecret:
        name: ${NAME}-git-secret
    strategy:
      type: Source
      sourceStrategy:
        from:
          kind: ImageStreamTag
          name: nodejs:${NODEJS_VERSION}
          namespace: ${NAMESPACE}
        env:
        - name: NPM_CONFIG_PRODUCTION
          value: ${NPM_CONFIG_PRODUCTION}
    triggers:
    - type: ConfigChange
    - type: ImageChange
      imageChange: {}
    - type: Generic
      generic:
        secret: ${GENERIC_WEBHOOK_SECRET}
parameters:
- name: NAME
  displayName: Application Name
  description: Name used for all resources created by this template
  required: true
  value: node-app
- name: SOURCE_REPOSITORY_URL
  displayName: Git Repository URL
  description: HTTPS URL of the private Git repository (do not embed credentials in the URL)
  required: true
  value: https://github.com/tomhac3k/tekton-pipelines.git
- name: SOURCE_REPOSITORY_REF
  displayName: Git Reference
  description: Branch, tag, or commit to build
  value: main
- name: GIT_USERNAME
  displayName: Git Username
  description: Username for Git authentication (GitLab/GitHub username, or oauth2 for some GitLab setups)
  required: true
  value: tomhac3k
- name: GIT_TOKEN
  displayName: Git Token
  description: Personal access token or password for Git authentication
  required: true
- name: CONTEXT_DIR
  displayName: Context Directory
  description: Relative path within the repository containing package.json (leave blank if at repo root)
  value: exam-prep/npm-app
- name: NODEJS_VERSION
  displayName: Node.js Version
  description: Node.js S2I builder image tag from the openshift namespace
  required: true
  value: 20-ubi9
- name: NAMESPACE
  displayName: Builder Image Namespace
  description: Namespace where the Node.js builder ImageStreamTag resides
  required: true
  value: openshift
- name: NPM_CONFIG_PRODUCTION
  displayName: NPM Production Mode
  description: Set to false to install devDependencies during the S2I build
  value: "false"
- name: GENERIC_WEBHOOK_SECRET
  displayName: Generic Webhook Secret
  description: Secret string for the Generic build webhook trigger
  generate: expression
  from: '[a-zA-Z0-9]{40}'
